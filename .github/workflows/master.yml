name: Master Build and Release

on:
  workflow_dispatch:
    inputs:
      build_ffmpeg:
        description: 'Build FFmpeg Package'
        required: true
        type: boolean
        default: true
      build_python:
        description: 'Build Python Package (Placeholder)'
        required: true
        type: boolean
        default: false
      build_quickjs:
        description: 'Build QuickJS Package'
        required: true
        type: boolean
        default: true
  push:
    branches:
      - main
    paths:
      - 'ffmpeg_package/**'
      - 'python_package/**'
      - 'quickjs_package/**'
      - '.github/workflows/master.yml'
    tags:
      - 'ffmpeg-v*'
      - 'python-v*'
      - 'quickjs-v*'
      - 'v*'

env:
  ENABLE_FFMPEG: 'true'         # Enable FFmpeg build job
  ENABLE_PYTHON: 'true'         # Enable Python build job
  ENABLE_QUICKJS: 'true'        # Enable QuickJS build job
  ENABLE_TAG_RELEASES: 'true'   # Set to 'false' to disable tag-triggered builds
  ENABLE_PUSH_BUILDS: 'true'     # Set to 'false' to disable push-triggered test builds on main

jobs:
  check:
    name: Check Changes
    runs-on: ubuntu-latest
    outputs:
      ffmpeg: ${{ steps.filter.outputs.ffmpeg }}
      python: ${{ steps.filter.outputs.python }}
      quickjs: ${{ steps.filter.outputs.quickjs }}
      enable_ffmpeg: ${{ steps.config.outputs.enable_ffmpeg }}
      enable_python: ${{ steps.config.outputs.enable_python }}
      enable_quickjs: ${{ steps.config.outputs.enable_quickjs }}
      enable_tag_releases: ${{ steps.config.outputs.enable_tag_releases }}
      enable_push_builds: ${{ steps.config.outputs.enable_push_builds }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Check Path Changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            ffmpeg:
              - 'ffmpeg_package/**'
              - '.github/workflows/master.yml'
            python:
              - 'python_package/**'
              - '.github/workflows/master.yml'
            quickjs:
              - 'quickjs_package/**'
              - '.github/workflows/master.yml'
      - name: Forward Configuration
        id: config
        run: |
          echo "enable_ffmpeg=${{ env.ENABLE_FFMPEG }}" >> $GITHUB_OUTPUT
          echo "enable_python=${{ env.ENABLE_PYTHON }}" >> $GITHUB_OUTPUT
          echo "enable_quickjs=${{ env.ENABLE_QUICKJS }}" >> $GITHUB_OUTPUT
          echo "enable_tag_releases=${{ env.ENABLE_TAG_RELEASES }}" >> $GITHUB_OUTPUT
          echo "enable_push_builds=${{ env.ENABLE_PUSH_BUILDS }}" >> $GITHUB_OUTPUT

  build-ffmpeg:
    name: Build FFmpeg Package
    needs: check
    if: |
      needs.check.outputs.enable_ffmpeg == 'true' && (
        (github.event_name == 'workflow_dispatch' && inputs.build_ffmpeg) ||
        (needs.check.outputs.enable_tag_releases == 'true' && (startsWith(github.ref, 'refs/tags/ffmpeg-v') || startsWith(github.ref, 'refs/tags/v'))) ||
        (needs.check.outputs.enable_push_builds == 'true' && github.event_name == 'push' && needs.check.outputs.ffmpeg == 'true')
      )
    runs-on: ubuntu-latest
    permissions:
      contents: write

    defaults:
      run:
        working-directory: ffmpeg_package

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r26b

      - name: Compile static mbedTLS
        run: |
          git clone --depth 1 --branch v3.6.0 https://github.com/Mbed-TLS/mbedtls.git mbedtls-source
          cd mbedtls-source
          git submodule update --init --recursive
          mkdir build
          cd build
          
          export NDK="${{ steps.setup-ndk.outputs.ndk-path }}"
          
          cmake -DCMAKE_TOOLCHAIN_FILE="$NDK/build/cmake/android.toolchain.cmake" \
            -DANDROID_ABI="arm64-v8a" \
            -DANDROID_PLATFORM="android-26" \
            -DENABLE_PROGRAMS=OFF \
            -DENABLE_TESTING=OFF \
            -DUSE_SHARED_MBEDTLS_LIBRARY=OFF \
            -DUSE_STATIC_MBEDTLS_LIBRARY=ON \
            -DCMAKE_INSTALL_PREFIX="${{ github.workspace }}/ffmpeg_package/mbedtls_install" \
            ..
          make -j$(nproc)
          make install

      - name: Compile static libx264
        run: |
          git clone --depth 1 https://code.videolan.org/videolan/x264.git x264-source
          cd x264-source
          
          export NDK="${{ steps.setup-ndk.outputs.ndk-path }}"
          export TOOLCHAIN="$NDK/toolchains/llvm/prebuilt/linux-x86_64"
          export TARGET="aarch64-linux-android"
          export API="26"
          
          export CC="$TOOLCHAIN/bin/$TARGET$API-clang"
          export AR="$TOOLCHAIN/bin/llvm-ar"
          export RANLIB="$TOOLCHAIN/bin/llvm-ranlib"
          export NM="$TOOLCHAIN/bin/llvm-nm"
          export STRIP="$TOOLCHAIN/bin/llvm-strip"
          export STRINGS="$TOOLCHAIN/bin/llvm-strings"
          export OBJDUMP="$TOOLCHAIN/bin/llvm-objdump"
          
          ./configure \
            --cross-prefix="$TOOLCHAIN/bin/$TARGET-" \
            --sysroot="$TOOLCHAIN/sysroot" \
            --host=aarch64-linux-android \
            --enable-static \
            --disable-cli \
            --enable-pic \
            --prefix="${{ github.workspace }}/ffmpeg_package/x264_install"
            
          make -j$(nproc)
          make install

      - name: Compile static libmp3lame
        run: |
          wget https://deb.debian.org/debian/pool/main/l/lame/lame_3.100.orig.tar.gz
          tar -xzf lame_3.100.orig.tar.gz
          cd lame-3.100
          
          # Fix type compatibility issue in LAME source with modern compilers
          find . -type f -exec sed -i 's/ieee754_float32_t/float/g' {} +
          
          export NDK="${{ steps.setup-ndk.outputs.ndk-path }}"
          export TOOLCHAIN="$NDK/toolchains/llvm/prebuilt/linux-x86_64"
          export TARGET="aarch64-linux-android"
          export API="26"
          
          export CC="$TOOLCHAIN/bin/$TARGET$API-clang"
          export AR="$TOOLCHAIN/bin/llvm-ar"
          export RANLIB="$TOOLCHAIN/bin/llvm-ranlib"
          
          ./configure \
            --host=aarch64-linux-android \
            --enable-static \
            --disable-shared \
            --disable-frontend \
            --prefix="${{ github.workspace }}/ffmpeg_package/lame_install" \
            CC="$CC --sysroot=$TOOLCHAIN/sysroot" \
            AR="$AR" \
            RANLIB="$RANLIB"
            
          make -j$(nproc)
          make install

      - name: Clone official FFmpeg Source
        run: |
          git clone --depth 1 --branch n7.1.1 https://github.com/FFmpeg/FFmpeg.git ffmpeg-source

      - name: Compile Standalone FFmpeg Binary
        run: |
          cd ffmpeg-source
          
          # Setup paths to NDK tools
          export NDK="${{ steps.setup-ndk.outputs.ndk-path }}"
          export TOOLCHAIN="$NDK/toolchains/llvm/prebuilt/linux-x86_64"
          export TARGET="aarch64-linux-android"
          export API="26"
          
          export AR="$TOOLCHAIN/bin/llvm-ar"
          export CC="$TOOLCHAIN/bin/$TARGET$API-clang"
          export AS="$CC"
          export CXX="$TOOLCHAIN/bin/$TARGET$API-clang++"
          export LD="$TOOLCHAIN/bin/ld.lld"
          export NM="$TOOLCHAIN/bin/llvm-nm"
          export RANLIB="$TOOLCHAIN/bin/llvm-ranlib"
          export STRIP="$TOOLCHAIN/bin/llvm-strip"
          
          # Create custom pkgconfig files for the target architectures
          mkdir -p "${{ github.workspace }}/ffmpeg_package/pkgconfig"
          
          cat << 'EOF' | sed 's/^[[:space:]]*//' > "${{ github.workspace }}/ffmpeg_package/pkgconfig/mbedtls.pc"
          prefix=${{ github.workspace }}/ffmpeg_package/mbedtls_install
          exec_prefix=${prefix}
          libdir=${exec_prefix}/lib
          includedir=${prefix}/include

          Name: mbedtls
          Description: mbed TLS light-weight SSL/TLS library
          Version: 3.6.0
          Libs: -L${libdir} -lmbedtls -lmbedx509 -lmbedcrypto
          Cflags: -I${includedir}
          EOF

          cat << 'EOF' | sed 's/^[[:space:]]*//' > "${{ github.workspace }}/ffmpeg_package/pkgconfig/mbedx509.pc"
          prefix=${{ github.workspace }}/ffmpeg_package/mbedtls_install
          exec_prefix=${prefix}
          libdir=${exec_prefix}/lib
          includedir=${prefix}/include

          Name: mbedx509
          Description: mbed TLS x509 library
          Version: 3.6.0
          Libs: -L${libdir} -lmbedx509
          Cflags: -I${includedir}
          EOF

          cat << 'EOF' | sed 's/^[[:space:]]*//' > "${{ github.workspace }}/ffmpeg_package/pkgconfig/mbedcrypto.pc"
          prefix=${{ github.workspace }}/ffmpeg_package/mbedtls_install
          exec_prefix=${prefix}
          libdir=${exec_prefix}/lib
          includedir=${prefix}/include

          Name: mbedcrypto
          Description: mbed TLS crypto library
          Version: 3.6.0
          Libs: -L${libdir} -lmbedcrypto
          Cflags: -I${includedir}
          EOF

          export PKG_CONFIG_PATH="${{ github.workspace }}/ffmpeg_package/x264_install/lib/pkgconfig:${{ github.workspace }}/ffmpeg_package/pkgconfig"
          
          ./configure \
            --cross-prefix="$TOOLCHAIN/bin/$TARGET-" \
            --sysroot="$TOOLCHAIN/sysroot" \
            --target-os=android \
            --arch=aarch64 \
            --cpu=armv8-a \
            --cc="$CC" \
            --as="$AS" \
            --ar="$AR" \
            --nm="$NM" \
            --ranlib="$RANLIB" \
            --strip="$STRIP" \
            --enable-cross-compile \
            --pkg-config="pkg-config" \
            --pkg-config-flags="--static" \
            --enable-static \
            --disable-shared \
            --disable-doc \
            --enable-ffmpeg \
            --disable-ffplay \
            --disable-ffprobe \
            --disable-symver \
            --enable-gpl \
            --enable-version3 \
            --disable-everything \
            --enable-mbedtls \
            --enable-libx264 \
            --enable-libmp3lame \
            --enable-protocol=file,http,https,tcp,udp,tls,crypto,data \
            --enable-demuxer=mov,matroska,hls,aac,mp3,ogg,flac,wav,image2,image2pipe,webp,ass,srt,webvtt,subrip,flv,dash \
            --enable-muxer=mp4,mov,matroska,webm,aac,mp3,ogg,opus,flac,wav,image2,image2pipe,webp,ass,srt,webvtt,flv,dash,mov_text,ipod \
            --enable-decoder=h264,hevc,vp9,av1,aac,opus,mp3,flac,vorbis,png,mjpeg,webp,gif,ass,srt,webvtt,subrip,mov_text,pcm_s16le \
            --enable-encoder=libx264,libmp3lame,aac,opus,flac,png,mjpeg,gif,ass,webvtt,subrip,mov_text,pcm_s16le,vorbis \
            --enable-parser=h264,hevc,vp9,av1,aac,opus,mpegaudio,png,mjpeg,webp,gif,ass,srt,webvtt \
            --enable-filter=aformat,aresample,scale,crop,null,trim,atrim,pan,volume \
            --enable-asm \
            --enable-neon \
            --enable-lto \
            --extra-cflags="-I${{ github.workspace }}/ffmpeg_package/mbedtls_install/include -I${{ github.workspace }}/ffmpeg_package/x264_install/include -I${{ github.workspace }}/ffmpeg_package/lame_install/include" \
            --extra-ldflags="-L${{ github.workspace }}/ffmpeg_package/mbedtls_install/lib -L${{ github.workspace }}/ffmpeg_package/x264_install/lib -L${{ github.workspace }}/ffmpeg_package/lame_install/lib"
            
          make -j$(nproc)
          
          # Verify binary
          if [ ! -f ffmpeg ]; then
            echo "Error: FFmpeg compilation failed, binary not found!"
            exit 1
          fi
          
          # Strip symbols to minimize size
          $STRIP ffmpeg

      - name: Print Configure Log on Failure
        if: failure()
        run: |
          if [ -f ffmpeg-source/ffbuild/config.log ]; then
            tail -n 300 ffmpeg-source/ffbuild/config.log
          else
            echo "config.log not found"
          fi

      - name: Move Binary and Package APK
        run: |
          mkdir -p app/src/main/jniLibs/arm64-v8a
          cp ffmpeg-source/ffmpeg app/src/main/jniLibs/arm64-v8a/libffmpeg.so
          
          chmod +x gradlew
          ./gradlew :app:assembleRelease
          
          # Fix native binary permissions in APK (Gradle/AAPT2 strips them)
          bash "${{ github.workspace }}/fix_apk_permissions.sh" \
            app/build/outputs/apk/release/app-release-unsigned.apk ffmpeg
          
          # Rename raw unsigned APK
          cp app/build/outputs/apk/release/app-release-unsigned.apk app/build/outputs/apk/release/ffmpeg-unsigned-arm64-v8a.apk

      - name: Sign Android Release APK
        env:
          SIGNING_KEY: ${{ secrets.SIGNING_KEY || secrets.RELEASE_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD || secrets.RELEASE_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS || secrets.RELEASE_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD || secrets.RELEASE_KEY_PASSWORD }}
        run: |
          if [ -z "$SIGNING_KEY" ]; then
            echo "=========================================================================="
            echo "WARNING: SIGNING_KEY secret is not set in GitHub Repository Secrets."
            echo "Skipping APK signing. The generated APK will be unsigned."
            echo "=========================================================================="
            cp app/build/outputs/apk/release/ffmpeg-unsigned-arm64-v8a.apk app/build/outputs/apk/release/ffmpeg-signed-arm64-v8a.apk
          else
            echo "Decoding signing key..."
            echo "$SIGNING_KEY" | base64 --decode > release.jks
            
            APKSIGNER=$(find $ANDROID_HOME/build-tools -name apksigner | sort -r | head -n 1)
            echo "Found apksigner at: $APKSIGNER"
            
            echo "Signing APK..."
            $APKSIGNER sign --ks release.jks \
              --ks-pass pass:"$KEYSTORE_PASSWORD" \
              --ks-key-alias "$KEY_ALIAS" \
              --key-pass pass:"$KEY_PASSWORD" \
              --out app/build/outputs/apk/release/ffmpeg-signed-arm64-v8a.apk \
              app/build/outputs/apk/release/ffmpeg-unsigned-arm64-v8a.apk
              
            echo "Verifying signed APK..."
            $APKSIGNER verify app/build/outputs/apk/release/ffmpeg-signed-arm64-v8a.apk
            
            echo "=== SHA-256 FINGERPRINT FOR FfmpegUpdateManager.kt ==="
            $APKSIGNER verify --print-certs app/build/outputs/apk/release/ffmpeg-signed-arm64-v8a.apk | grep -i sha-256
            echo "======================================================"
            
            rm -f release.jks
          fi

      - name: Upload Packaged APK
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-custom-package
          path: |
            ffmpeg_package/app/build/outputs/apk/release/ffmpeg-unsigned-arm64-v8a.apk
            ffmpeg_package/app/build/outputs/apk/release/ffmpeg-signed-arm64-v8a.apk

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/ffmpeg-v') || startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ffmpeg_package/app/build/outputs/apk/release/ffmpeg-signed-arm64-v8a.apk
            ffmpeg_package/app/build/outputs/apk/release/ffmpeg-unsigned-arm64-v8a.apk
          generate_release_notes: true
          draft: false
          prerelease: false

  build-python:
    name: Build Python Package
    needs: check
    if: |
      needs.check.outputs.enable_python == 'true' && (
        (github.event_name == 'workflow_dispatch' && inputs.build_python) ||
        (needs.check.outputs.enable_tag_releases == 'true' && startsWith(github.ref, 'refs/tags/python-v')) ||
        (needs.check.outputs.enable_push_builds == 'true' && github.event_name == 'push' && needs.check.outputs.python == 'true')
      )
    runs-on: ubuntu-latest
    permissions:
      contents: write

    defaults:
      run:
        working-directory: python_package

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r26b

      - name: Install Host Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libssl-dev zlib1g-dev libffi-dev libbz2-dev libsqlite3-dev

      - name: Compile Python and Dependencies
        run: |
          export ANDROID_NDK_HOME="${{ steps.setup-ndk.outputs.ndk-path }}"
          chmod +x build_python.sh
          ./build_python.sh

      - name: Build Release APK
        run: |
          chmod +x gradlew
          ./gradlew :app:assembleRelease
          
          # Fix native binary permissions in APK (Gradle/AAPT2 strips them)
          bash "${{ github.workspace }}/fix_apk_permissions.sh" \
            app/build/outputs/apk/release/app-release-unsigned.apk python
          
          # Rename raw unsigned APK
          cp app/build/outputs/apk/release/app-release-unsigned.apk app/build/outputs/apk/release/python-unsigned-arm64-v8a.apk

      - name: Sign Android Release APK
        env:
          SIGNING_KEY: ${{ secrets.SIGNING_KEY || secrets.RELEASE_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD || secrets.RELEASE_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS || secrets.RELEASE_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD || secrets.RELEASE_KEY_PASSWORD }}
        run: |
          if [ -z "$SIGNING_KEY" ]; then
            echo "=========================================================================="
            echo "WARNING: SIGNING_KEY secret is not set in GitHub Repository Secrets."
            echo "Skipping APK signing. The generated APK will be unsigned."
            echo "=========================================================================="
            cp app/build/outputs/apk/release/python-unsigned-arm64-v8a.apk app/build/outputs/apk/release/python-signed-arm64-v8a.apk
          else
            echo "Decoding signing key..."
            echo "$SIGNING_KEY" | base64 --decode > release.jks
            
            APKSIGNER=$(find $ANDROID_HOME/build-tools -name apksigner | sort -r | head -n 1)
            echo "Found apksigner at: $APKSIGNER"
            
            echo "Signing APK..."
            $APKSIGNER sign --ks release.jks \
              --ks-pass pass:"$KEYSTORE_PASSWORD" \
              --ks-key-alias "$KEY_ALIAS" \
              --key-pass pass:"$KEY_PASSWORD" \
              --out app/build/outputs/apk/release/python-signed-arm64-v8a.apk \
              app/build/outputs/apk/release/python-unsigned-arm64-v8a.apk
              
            echo "Verifying signed APK..."
            $APKSIGNER verify app/build/outputs/apk/release/python-signed-arm64-v8a.apk
            
            echo "=== SHA-256 FINGERPRINT FOR Python Updates ==="
            $APKSIGNER verify --print-certs app/build/outputs/apk/release/python-signed-arm64-v8a.apk | grep -i sha-256
            echo "=============================================="
            
            rm -f release.jks
          fi

      - name: Upload Packaged APK
        uses: actions/upload-artifact@v4
        with:
          name: python-custom-package
          path: |
            python_package/app/build/outputs/apk/release/python-unsigned-arm64-v8a.apk
            python_package/app/build/outputs/apk/release/python-signed-arm64-v8a.apk

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/python-v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            python_package/app/build/outputs/apk/release/python-signed-arm64-v8a.apk
            python_package/app/build/outputs/apk/release/python-unsigned-arm64-v8a.apk
          generate_release_notes: true
          draft: false
          prerelease: false

  build-quickjs:
    name: Build QuickJS Package
    needs: check
    if: |
      needs.check.outputs.enable_quickjs == 'true' && (
        (github.event_name == 'workflow_dispatch' && inputs.build_quickjs) ||
        (needs.check.outputs.enable_tag_releases == 'true' && startsWith(github.ref, 'refs/tags/quickjs-v')) ||
        (needs.check.outputs.enable_push_builds == 'true' && github.event_name == 'push' && needs.check.outputs.quickjs == 'true')
      )
    runs-on: ubuntu-latest
    permissions:
      contents: write

    defaults:
      run:
        working-directory: quickjs_package

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r26b

      - name: Compile QuickJS
        run: |
          export ANDROID_NDK_HOME="${{ steps.setup-ndk.outputs.ndk-path }}"
          chmod +x build_quickjs.sh
          ./build_quickjs.sh

      - name: Build Release APK
        run: |
          chmod +x gradlew
          ./gradlew :app:assembleRelease
          
          # Fix native binary permissions in APK (Gradle/AAPT2 strips them)
          bash "${{ github.workspace }}/fix_apk_permissions.sh" \
            app/build/outputs/apk/release/app-release-unsigned.apk quickjs
          
          # Rename raw unsigned APK
          cp app/build/outputs/apk/release/app-release-unsigned.apk app/build/outputs/apk/release/quickjs-unsigned-arm64-v8a.apk

      - name: Sign Android Release APK
        env:
          SIGNING_KEY: ${{ secrets.SIGNING_KEY || secrets.RELEASE_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD || secrets.RELEASE_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS || secrets.RELEASE_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD || secrets.RELEASE_KEY_PASSWORD }}
        run: |
          if [ -z "$SIGNING_KEY" ]; then
            echo "=========================================================================="
            echo "WARNING: SIGNING_KEY secret is not set in GitHub Repository Secrets."
            echo "Skipping APK signing. The generated APK will be unsigned."
            echo "=========================================================================="
            cp app/build/outputs/apk/release/quickjs-unsigned-arm64-v8a.apk app/build/outputs/apk/release/quickjs-signed-arm64-v8a.apk
          else
            echo "Decoding signing key..."
            echo "$SIGNING_KEY" | base64 --decode > release.jks
            
            APKSIGNER=$(find $ANDROID_HOME/build-tools -name apksigner | sort -r | head -n 1)
            echo "Found apksigner at: $APKSIGNER"
            
            echo "Signing APK..."
            $APKSIGNER sign --ks release.jks \
              --ks-pass pass:"$KEYSTORE_PASSWORD" \
              --ks-key-alias "$KEY_ALIAS" \
              --key-pass pass:"$KEY_PASSWORD" \
              --out app/build/outputs/apk/release/quickjs-signed-arm64-v8a.apk \
              app/build/outputs/apk/release/quickjs-unsigned-arm64-v8a.apk
              
            echo "Verifying signed APK..."
            $APKSIGNER verify app/build/outputs/apk/release/quickjs-signed-arm64-v8a.apk
            
            echo "=== SHA-256 FINGERPRINT FOR QuickJS Updates ==="
            $APKSIGNER verify --print-certs app/build/outputs/apk/release/quickjs-signed-arm64-v8a.apk | grep -i sha-256
            echo "=============================================="
            
            rm -f release.jks
          fi

      - name: Upload Packaged APK
        uses: actions/upload-artifact@v4
        with:
          name: quickjs-custom-package
          path: |
            quickjs_package/app/build/outputs/apk/release/quickjs-unsigned-arm64-v8a.apk
            quickjs_package/app/build/outputs/apk/release/quickjs-signed-arm64-v8a.apk

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/quickjs-v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            quickjs_package/app/build/outputs/apk/release/quickjs-signed-arm64-v8a.apk
