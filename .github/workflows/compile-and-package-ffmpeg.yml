name: Compile and Package FFmpeg for Android

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r26b

      - name: Compile static mbedTLS
        run: |
          git clone --depth 1 --branch v3.6.0 https://github.com/Mbed-TLS/mbedtls.git mbedtls-source
          cd mbedtls-source
          git submodule update --init --recursive
          mkdir build
          cd build
          
          export NDK="${{ steps.setup-ndk.outputs.ndk-path }}"
          
          cmake -DCMAKE_TOOLCHAIN_FILE="$NDK/build/cmake/android.toolchain.cmake" \
            -DANDROID_ABI="arm64-v8a" \
            -DANDROID_PLATFORM="android-26" \
            -DENABLE_PROGRAMS=OFF \
            -DENABLE_TESTING=OFF \
            -DUSE_SHARED_MBEDTLS_LIBRARY=OFF \
            -DUSE_STATIC_MBEDTLS_LIBRARY=ON \
            -DCMAKE_INSTALL_PREFIX="${{ github.workspace }}/mbedtls_install" \
            ..
          make -j$(nproc)
          make install

      - name: Clone official FFmpeg Source
        run: |
          git clone --depth 1 --branch n7.0.1 https://github.com/FFmpeg/FFmpeg.git ffmpeg-source

      - name: Compile Standalone FFmpeg Binary
        run: |
          cd ffmpeg-source
          
          # Setup paths to NDK tools
          export NDK="${{ steps.setup-ndk.outputs.ndk-path }}"
          export TOOLCHAIN="$NDK/toolchains/llvm/prebuilt/linux-x86_64"
          export TARGET="aarch64-linux-android"
          export API="26"
          
          export AR="$TOOLCHAIN/bin/llvm-ar"
          export CC="$TOOLCHAIN/bin/$TARGET$API-clang"
          export AS="$CC"
          export CXX="$TOOLCHAIN/bin/$TARGET$API-clang++"
          export LD="$TOOLCHAIN/bin/ld.lld"
          export RANLIB="$TOOLCHAIN/bin/llvm-ranlib"
          export STRIP="$TOOLCHAIN/bin/llvm-strip"
          
          # Create custom pkgconfig files for the target architectures
          mkdir -p "${{ github.workspace }}/pkgconfig"
          
          cat << 'EOF' | sed 's/^[[:space:]]*//' > "${{ github.workspace }}/pkgconfig/mbedtls.pc"
          prefix=${{ github.workspace }}/mbedtls_install
          exec_prefix=${prefix}
          libdir=${exec_prefix}/lib
          includedir=${prefix}/include

          Name: mbedtls
          Description: mbed TLS light-weight SSL/TLS library
          Version: 3.6.0
          Libs: -L${libdir} -lmbedtls -lmbedx509 -lmbedcrypto
          Cflags: -I${includedir}
          EOF

          cat << 'EOF' | sed 's/^[[:space:]]*//' > "${{ github.workspace }}/pkgconfig/mbedx509.pc"
          prefix=${{ github.workspace }}/mbedtls_install
          exec_prefix=${prefix}
          libdir=${exec_prefix}/lib
          includedir=${prefix}/include

          Name: mbedx509
          Description: mbed TLS x509 library
          Version: 3.6.0
          Libs: -L${libdir} -lmbedx509
          Cflags: -I${includedir}
          EOF

          cat << 'EOF' | sed 's/^[[:space:]]*//' > "${{ github.workspace }}/pkgconfig/mbedcrypto.pc"
          prefix=${{ github.workspace }}/mbedtls_install
          exec_prefix=${prefix}
          libdir=${exec_prefix}/lib
          includedir=${prefix}/include

          Name: mbedcrypto
          Description: mbed TLS crypto library
          Version: 3.6.0
          Libs: -L${libdir} -lmbedcrypto
          Cflags: -I${includedir}
          EOF

          export PKG_CONFIG_PATH="${{ github.workspace }}/pkgconfig"
          
          ./configure \
            --cross-prefix="$TOOLCHAIN/bin/$TARGET-" \
            --sysroot="$TOOLCHAIN/sysroot" \
            --target-os=android \
            --arch=aarch64 \
            --cpu=armv8-a \
            --cc="$CC" \
            --as="$AS" \
            --ar="$AR" \
            --ranlib="$RANLIB" \
            --strip="$STRIP" \
            --enable-cross-compile \
            --enable-static \
            --disable-shared \
            --disable-doc \
            --enable-ffmpeg \
            --disable-ffplay \
            --disable-ffprobe \
            --disable-symver \
            --enable-gpl \
            --enable-version3 \
            --disable-everything \
            --enable-mbedtls \
            --enable-protocol=file,http,https,tcp,udp,tls \
            --enable-demuxer=mov,matroska,hls,aac,mp3,ogg,flac,wav \
            --enable-muxer=mp4,mov,matroska,webm,aac,mp3,ogg,opus,flac,wav,image2 \
            --enable-decoder=h264,hevc,vp9,av1,aac,opus,mp3,flac,vorbis,png,mjpeg \
            --enable-encoder=aac,opus,flac \
            --enable-parser=h264,hevc,vp9,av1,aac,opus,mpegaudio,png,mjpeg \
            --enable-filter=aformat,aresample,scale,crop,null \
            --enable-asm \
            --enable-neon \
            --enable-lto
            
          make -j$(nproc)
          
          # Verify binary
          if [ ! -f ffmpeg ]; then
            echo "Error: FFmpeg compilation failed, binary not found!"
            exit 1
          fi
          
          # Strip symbols to minimize size
          $STRIP ffmpeg

      - name: Move Binary and Package APK
        run: |
          mkdir -p app/src/main/jniLibs/arm64-v8a
          cp ffmpeg-source/ffmpeg app/src/main/jniLibs/arm64-v8a/libffmpeg.so
          
          chmod +x gradlew
          ./gradlew :app:assembleRelease

      - name: Upload Packaged APK
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-custom-package
          path: app/build/outputs/apk/release/app-release-unsigned.apk
